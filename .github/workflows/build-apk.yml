name: Build Android APK (Capacitor Fixed)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: true

    - name: Initialize App Package
      run: |
        # অ্যান্ড্রয়েড বিল্ডের জন্য নিখুঁত package.json তৈরি
        echo '{"name": "kd-player-app", "version": "1.0.0", "dependencies": {"@capacitor/core": "^6.0.0"}, "devDependencies": {"@capacitor/cli": "^6.0.0", "@capacitor/android": "^6.0.0"}}' > package.json
        npm install

    - name: Configure Capacitor
      run: |
        # কনফিগারেশন ফাইল তৈরি
        echo '{"appId": "com.kdplayer.retro", "appName": "KDPlayer", "webDir": "."}' > capacitor.config.json
        npx cap add android

    - name: Sync Web Files to Android
      run: |
        # গিটহাবের ইন্টারনাল ফাইলগুলো বাদ দিয়ে সিঙ্ক করা
        npx cap sync android

    - name: Fix Android Build Permissions & Build APK
      run: |
        cd android
        # লিনাক্স এনভায়রনমেন্টে গ্র্যাডল রান করার পারমিশন ফিক্স
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: KD-Player-Capacitor-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
