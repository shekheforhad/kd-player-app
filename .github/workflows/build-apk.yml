name: Build Android APK (Final Fix)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: true

    - name: Prepare Workspace & Assets
      run: |
        # অ্যান্ড্রয়েড অ্যাপের জন্য পরিষ্কার পাথ ও ডিরেক্টরি তৈরি
        mkdir -p www
        
        # রুট ডিরেক্টরি থেকে সব ওয়েব ফাইল .html, .css এবং ফোল্ডার www এর ভেতরে কপি করা হচ্ছে
        cp -r js www/ || true
        cp *.html www/ || true
        cp *.css www/ || true
        cp *.png www/ || true
        
        # বিল্ড প্যাকেজ কনফিগারেশন
        echo '{"name": "kd-player-app", "version": "1.0.0", "dependencies": {"@capacitor/core": "^6.0.0"}, "devDependencies": {"@capacitor/cli": "^6.0.0", "@capacitor/android": "^6.0.0"}}' > package.json
        npm install

    - name: Configure Capacitor Project
      run: |
        # নতুন তৈরি হওয়া www ফোল্ডারকে ওয়েব ডিরেক্টরি হিসেবে এসাইন করা হলো
        echo '{"appId": "com.kdplayer.retro", "appName": "KDPlayer", "webDir": "www"}' > capacitor.config.json
        npx cap add android

    - name: Sync Code to Native Project
      run: |
        npx cap sync android

    - name: Fix Linux Gradle Permissions & Compile APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KD-Player-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
