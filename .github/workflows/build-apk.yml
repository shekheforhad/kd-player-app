name: Build Android APK (Icon Forced Fix)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: true

    - name: Prepare Workspace & Assets
      run: |
        mkdir -p www
        cp -r js www/ || true
        cp *.html www/ || true
        cp *.css www/ || true
        cp *.png www/ || true
        
        echo '{"name": "kd-player-app", "version": "1.0.0", "dependencies": {"@capacitor/core": "^6.0.0"}, "devDependencies": {"@capacitor/cli": "^6.0.0", "@capacitor/android": "^6.0.0"}}' > package.json
        npm install

    - name: Configure Capacitor Project
      run: |
        echo '{"appId": "com.kdplayer.retro", "appName": "KDPlayer", "webDir": "www"}' > capacitor.config.json
        npx cap add android

    - name: Force Android App Icon Replacement
      run: |
        # অ্যান্ড্রয়েডের ভেতরের আইকন রাখার মেইন ৫টি ফোল্ডার পাথ ডেফিসিয়েশন
        RES_DIR="android/app/src/main/res"
        
        # আপনার দেওয়া favicon.png বা cd.png-কে আইকন সোর্স হিসেবে ধরা
        if [ -f "www/favicon.png" ]; then
          SRC_ICON="www/favicon.png"
        else
          SRC_ICON="www/cd.png"
        fi
        
        # 🎯 অ্যান্ড্রয়েডের সমস্ত ডিফল্ট (গোল ও চারকোনা) আইকন আপনার ছবি দিয়ে জোরপূর্বক পরিবর্তন করা হলো
        cp $SRC_ICON $RES_DIR/mipmap-mdpi/ic_launcher.png || true
        cp $SRC_ICON $RES_DIR/mipmap-hdpi/ic_launcher.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xhdpi/ic_launcher.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxhdpi/ic_launcher.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxxhdpi/ic_launcher.png || true
        
        cp $SRC_ICON $RES_DIR/mipmap-mdpi/ic_launcher_round.png || true
        cp $SRC_ICON $RES_DIR/mipmap-hdpi/ic_launcher_round.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xhdpi/ic_launcher_round.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png || true
        
        cp $SRC_ICON $RES_DIR/mipmap-mdpi/ic_launcher_foreground.png || true
        cp $SRC_ICON $RES_DIR/mipmap-hdpi/ic_launcher_foreground.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xhdpi/ic_launcher_foreground.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxhdpi/ic_launcher_foreground.png || true
        cp $SRC_ICON $RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png || true

    - name: Sync Code to Native Project
      run: |
        npx cap sync android

    - name: Fix Linux Gradle Permissions & Compile APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KD-Player-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
