
name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-size: 16

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Install Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project & Build APK
      run: |
        cordova create myApp com.kdplayer.retro KDPlayer
        cd myApp
        cordova platform add android
        rm -rf www/*
        cp -r ../* www/ || true
        rm -rf www/myApp www/.github
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v3
      with:
        name: KD-Player-APK
        path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
